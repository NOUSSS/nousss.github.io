<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Films - Mugiwara-no Streaming</title>
    <link rel="stylesheet" href="./src/Films/index.css" />
    <link rel="shortcut icon" href="./src/Assets/Icon.png" type="image/x-icon" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mugiwara-no Streaming" />
    <meta
      property="og:description"
      content="Un site pour regarder Mugiwara-no gratuitement avec tout les épisodes et films à jour en VF et en VOSTFR !"
    />
    <meta content="#ff7300" data-react-helmet="true" name="theme-color" />
  </head>
  <body>
    <img class="background" src="./src/Assets/Background.jpg" />

    <div class="container">
      <a href="index"
        ><h1>Mugiwara-no <span>Streaming</span></h1></a
      >
      <div class="secondContainer">
        <p class="firstText">Les films disponibles en VOSTFR.</p>
        <div class="findText"></div>
        <!-- <div class="buttonSwitch">
          <input type="checkbox" />
          <p class="toggle">VOSTFR</p>
        </div> -->
        <div class="video"></div>
        <div class="tips"></div>
        <div class="downloadButton">
          <p>
            <img src="src/Assets/Download.png" class="image" />
            <span>Télécharger le film.</span>
          </p>
        </div>
        <label class="searchBar" for="">
          <img class="searchImg" /><input
            type="search"
            name="sagaSearch"
            placeholder="Rechercher"
            title="Système de recherche avancé."
          />
        </label>
        <div class="visible">
          <div class="films"></div>
        </div>
      </div>

      <footer>
        <p>Developed by NouSs</p>
      </footer>
      <script src="./src/Films/index.js"></script>
    </div>
  </body>
</html>
