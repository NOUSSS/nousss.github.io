<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sagas - Mugiwara-no Streaming</title>
    <link rel="stylesheet" href="./src/Sagas/index.css" />
    <script src="./src/Sagas/index.js"></script>
    <link rel="shortcut icon" href="./src/Assets/Logo.png" type="image/x-icon" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mugiwara-no Streaming" />
    <meta content="https://nousss.github.io" property="og:url" />
    <meta
      property="og:description"
      content="Pourquoi ne pas regarder ou lire son animé préféré dans de bonne de condition !"
    />
    <meta content="#ff7300" data-react-helmet="true" name="theme-color" />
  </head>
  <body>
    <img class="background" src="./src/Assets/Background.jpg" alt="" />
    <a href="/"
      ><h1 class="logo"><span>Mugiwara-no</span> Streaming</h1></a
    >
    <div class="container">
      <div class="title">
        <img class="logoImage" src="src/Assets/Logo.png" alt="" />
        <h1>One <span>Piece</span></h1>
      </div>
      <div class="secondContainer">
        <p class="firstText">Les sagas disponibles. (BETA)</p>
        <div class="findText"></div>
        <label class="searchBarSagas" for="">
          <img class="searchImg" /><input
            type="search"
            name="sagaSearch"
            placeholder="Rechercher"
            title="Système de recherche avancé."
          />
        </label>
        <div class="visible">
          <div class="sagas"></div>
        </div>
        <footer>© 2022 Mugiwara-no Streaming - Tous droits réservés.</footer>
      </div>
    </div>
  </body>
</html>
