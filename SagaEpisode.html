<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/Sagas/index.css" />
    <link rel="shortcut icon" href="./src/Assets/LogoForTest.png" type="image/x-icon" />
    <title>Mugiwara-no Streaming</title>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mugiwara-no Streaming" />
    <meta content="https://nousss.github.io" property="og:url" />
    <meta
      property="og:description"
      content="Pourquoi ne pas regarder ou lire son animé préféré dans de bonne de condition !"
    />
    <meta content="#ff7300" data-react-helmet="true" name="theme-color" />
  </head>
  <body>
    <img class="background" src="./src/Assets/Background.jpg" alt="" />
    <a class="a" href="/"
      ><h1 class="logo"><span>Mugiwara-no</span> Streaming</h1></a
    >
    <div class="container">
      <div class="secondContainer">
        <p class="firstText"></p>
        <p class="recommandation"></p>
        <!-- <div class="langage-choices">VostFR</div> -->
        <label class="searchBar" for="">
          <img class="searchImg" /><input
            type="search"
            name="sagaSearch"
            placeholder="Rechercher"
            title="Système de recherche avancé."
          />
        </label>

        <div class="thirdContainer">
          <div class="secondText"></div>

          <p class="loading"></p>

          <p class="bigText"></p>
          <div class="episodes"></div>
          <div class="buttonsContainer">
            <div class="buttons"></div>
          </div>
          <!-- <select name="lecteur">
          <option value="" disabled selected hidden>Changer de lecteur</option>
          <option value="Sibnet">Sibnet</option>
          <option value="Myvi">Myvi</option>
        </select> -->
          <div class="listContainer"><div class="list"></div></div>
          <div class="buttonSagaContainer">
            <button class="prevSaga">Saga précédente</button>
            <button class="nextSaga">Saga suivante</button>
          </div>
          <p class="mark">Les vidéos ne sont pas hébergées sur nos serveurs.</p>
          <footer>© 2022 Mugiwara-no Streaming - Tous droits réservés.</footer>
        </div>
      </div>
      <script src="./src/Sagas/episode.js"></script>
    </div>
  </body>
</html>
